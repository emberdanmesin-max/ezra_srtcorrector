<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ezra SRT - Pemulih Subtitle</title>
    <style>
        :root {
            --primary: #1a3a5f; /* Deep Blue */
            --accent: #d4af37;  /* Gold */
            --bg: #f8f9fa;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; line-height: 1.6; max-width: 900px; margin: 0 auto; padding: 20px; background-color: var(--bg); color: #333; }
        .container { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); border-top: 5px solid var(--accent); }
        
        /* Logo Styling */
        .logo-container { text-align: center; margin-bottom: 30px; }
        .logo-icon { width: 80px; height: 80px; fill: var(--primary); margin-bottom: 10px; }
        .brand-name { font-size: 2.5em; font-weight: bold; color: var(--primary); margin: 0; letter-spacing: 1px; }
        .tagline { font-style: italic; color: #7f8c8d; margin-top: 5px; }

        .input-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 30px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: var(--primary); }
        textarea { width: 100%; height: 250px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-family: monospace; font-size: 13px; box-sizing: border-box; transition: border 0.3s; }
        textarea:focus { border-color: var(--accent); outline: none; }
        
        button { width: 100%; padding: 15px; background-color: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: all 0.3s; box-shadow: 0 4px 15px rgba(26, 58, 95, 0.2); }
        button:hover { background-color: #122842; transform: translateY(-2px); }
        
        #status { margin-top: 20px; text-align: center; font-weight: bold; }
        .success { color: #27ae60; }
        .footer { margin-top: 50px; text-align: center; font-size: 0.9em; color: #95a5a6; border-top: 1px solid #eee; padding-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo-container">
        <!-- Ikon Bulu Pena & Digital Bar -->
        <svg class="logo-icon" viewBox="0 0 24 24">
            <path d="M21 2H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h4l4 4 4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM8 11h8v2H8v-2zm0-4h8v2H8V7zm0 8h5v2H8v-2z"/>
        </svg>
        <h1 class="brand-name">EZRA SRT</h1>
        <div class="tagline">"Menyelaraskan Kata, Memulihkan Makna"</div>
    </div>

    <div class="input-section">
        <div>
            <label>📜 Subtitle AI (Input):</label>
            <textarea id="srtInput" placeholder="Tempel file SRT Anda di sini..."></textarea>
        </div>
        <div>
            <label>📖 Teks Referensi (Kanon):</label>
            <textarea id="refInput" placeholder="Tempel naskah asli Anda di sini..."></textarea>
        </div>
    </div>

    <button onclick="prosesKoreksi()">🕊️ PULIHKAN SEKARANG</button>
    <div id="status"></div>

    <div class="footer">
        <b>Ezra SRT</b> &copy; 2024. Semua proses dilakukan secara lokal di perangkat Anda.
    </div>
</div>

<script>
    // Algoritma Levenshtein untuk kemiripan teks
    function levenshtein(a, b) {
        const tmp = [];
        if (a.length === 0) return b.length;
        if (b.length === 0) return a.length;
        for (let i = 0; i <= b.length; i++) tmp[i] = [i];
        for (let j = 0; j <= a.length; j++) tmp[0][j] = j;
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                tmp[i][j] = b.charAt(i - 1) === a.charAt(j - 1) 
                    ? tmp[i - 1][j - 1] 
                    : Math.min(tmp[i - 1][j - 1] + 1, tmp[i][j - 1] + 1, tmp[i - 1][j] + 1);
            }
        }
        return tmp[b.length][a.length];
    }

    function getSimilarity(a, b) {
        return 1 - levenshtein(a.toLowerCase(), b.toLowerCase()) / Math.max(a.length, b.length);
    }

    function prosesKoreksi() {
        const srtText = document.getElementById('srtInput').value;
        const refText = document.getElementById('refInput').value;
        const status = document.getElementById('status');

        if (!srtText || !refText) {
            status.innerHTML = "<span style='color:red'>Harap isi semua input!</span>";
            return;
        }

        status.innerHTML = "Memproses pemulihan...";
        
        const refWords = refText.trim().split(/\s+/);
        let currentRefIdx = 0;
        const lines = srtText.split(/\r?\n/);
        const resultLines = [];
        let isTextLine = false;

        for (let line of lines) {
            const strip = line.trim();
            if (strip.includes("-->")) {
                resultLines.push(line);
                isTextLine = true;
                continue;
            }
            if (!strip || /^\d+$/.test(strip)) {
                resultLines.push(line);
                if (/^\d+$/.test(strip)) isTextLine = false;
                continue;
            }

            if (isTextLine) {
                const n = strip.split(/\s+/).length;
                let bestSeg = "", maxSim = -1, bestAdv = 0;

                for (let off = 0; off < 20; off++) {
                    let start = currentRefIdx + off;
                    if (start >= refWords.length) break;
                    for (let v = -3; v <= 3; v++) {
                        let count = n + v;
                        if (count <= 0) continue;
                        let end = start + count;
                        if (end > refWords.length) break;
                        let cand = refWords.slice(start, end).join(" ");
                        let sim = getSimilarity(strip, cand);
                        if (sim > maxSim) { maxSim = sim; bestSeg = cand; bestAdv = off + count; }
                    }
                }

                if (maxSim > 0.25) {
                    resultLines.push(bestSeg);
                    currentRefIdx += bestAdv;
                } else {
                    let fall = refWords.slice(currentRefIdx, currentRefIdx + n).join(" ");
                    resultLines.push(fall || strip);
                    currentRefIdx += n;
                }
                isTextLine = false;
            } else {
                resultLines.push(line);
            }
        }

        const blob = new Blob([resultLines.join("\n")], { type: 'text/plain' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = "PULIHAN_EZRA.srt";
        a.click();
        status.innerHTML = "<span class='success'>✅ Pemulihan Selesai! File diunduh otomatis.</span>";
    }
</script>

</body>
</html>
